<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    :root{
      --ink:#0a0a0a;
      --paper:#ffffff;
      --muted:#6b6b6b;
      --line:#e6e6e6;
    }
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      background:var(--paper);color:var(--ink);
      font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      -webkit-font-smoothing:antialiased;

    }
    .card{width:100%;max-width:440px}

      color:var(--muted);margin:0 0 28px;
    }
    h1{font-size:30px;line-height:1.2;margin:0 0 10px;font-weight:700;letter-spacing:-.01em}
    p.lead{margin:0 0 28px;color:var(--muted);font-size:16px;line-height:1.5}
    .rule{height:1px;background:var(--line);margin:0 0 8px}
    .links{list-style:none;margin:0;padding:0}
    .links li{border-bottom:1px solid var(--line)}
    .links a{
      display:flex;justify-content:space-between;align-items:center;
      padding:16px 2px;text-decoration:none;color:var(--ink);
      font-size:16px;font-weight:500;
    }
    .links a:hover{color:var(--muted)}
    .links a .arrow{color:var(--muted);font-weight:400}
    .foot{margin-top:32px;font-size:13px;color:var(--muted)}
    .foot a{color:var(--ink);text-decoration:none}
    @media (prefers-reduced-motion:no-preference){
      .links a{transition:color .15s ease}
    }
  </style>
</head>

</html>
