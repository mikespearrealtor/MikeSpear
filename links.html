<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .wrap {
      width: 100%;
      max-width: 440px;
      padding: 48px 24px 72px;
    }

    .hero {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 28px;
      aspect-ratio: 4 / 5;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 45%;
      background: linear-gradient(to bottom, transparent, rgba(10,10,10,0.85));
    }

    .hero .monogram {
      position: absolute;
      bottom: 18px;
      left: 20px;
      height: 36px;
      width: auto;
      margin: 0;
    }

    h1 {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .meta {
      font-size: 14px;
      color: #555;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .rule {
      width: 36px;
      height: 1px;
      background: #2a2a2a;
      margin-bottom: 32px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 32px;
    }

    a.btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border: 1px solid #1c1c1c;
      border-radius: 10px;
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.01em;
      transition: background 0.15s, border-color 0.15s;
    }

    a.btn:hover {
      background: #131313;
      border-color: #2c2c2c;
    }

    a.btn .arrow {
      color: #444;
      font-size: 13px;
      flex-shrink: 0;
      margin-left: 12px;
    }

    a.btn-compass {
      padding: 14px 20px;
    }

    a.btn-compass img {
      height: 15px;
      width: auto;
      filter: invert(1);
      opacity: 0.8;
    }

    a.btn-compass:hover img {
      opacity: 1;
    }

    a.btn-primary {
      background: #fff;
      color: #0a0a0a;
      border-color: #fff;
    }

    a.btn-primary:hover {
      background: #e8e8e8;
      border-color: #e8e8e8;
    }

    a.btn-primary .arrow {
      color: #888;
    }

    footer {
      margin-top: 16px;
      font-size: 11px;
      color: #2a2a2a;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

  <div class="wrap">

    <div class="hero">
      <img src="/hero.jpg" alt="Mike Spear">
      <img class="monogram" src="/logo.webp" alt="MS">
    </div>

    <h1>Mike Spear</h1>
    <p class="meta">Houston, TX &middot; Compass Real Estate &middot; 35+ years</p>
    <div class="rule"></div>

    <div class="links">
      <a class="btn btn-compass" href="https://www.compass.com/agents/mike-spear/" target="_blank" rel="noopener">
        <img src="/compass-logo.png" alt="Compass">
        <span class="arrow">&#8599;</span>
      </a>
      <a class="btn" href="https://www.har.com/mike-spear/agent_spear" target="_blank" rel="noopener">
        HAR Profile <span class="arrow">&#8599;</span>
      </a>
    </div>

    <div class="links">
      <a class="btn btn-primary" href="tel:+17132047653">
        Call or Text &middot; 713-204-7653 <span class="arrow">&#8599;</span>
      </a>
      <a class="btn" href="mailto:mike@mikespear.com">
        mike@mikespear.com <span class="arrow">&#8599;</span>
      </a>
      <a class="btn" href="https://files.mikespear.com/contact.vcf">
        Save Contact <span class="arrow">&#8595;</span>
      </a>
    </div>

    <footer>mikespear.com</footer>

  </div>

</body>
</html>
